services:
  - type: web
    name: sentinel-q-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-q-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"
      - key: FRONTEND_URL
        sync: false

  - type: postgres
    name: sentinel-q-db
    plan: free
    databaseName: sentinel_q
